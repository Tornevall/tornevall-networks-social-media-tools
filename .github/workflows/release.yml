name: Release Extension

on:
  # Triggas automatiskt vid tagg-push (v*.*.*)
  push:
    tags:
      - 'v*.*.*'
  # Manuell trigger via GitHub Actions UI → "Run workflow"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version att releasa (utan v-prefix, t.ex. 1.2.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}"         >> "$GITHUB_OUTPUT"

      - name: Build extension ZIP
        run: |
          zip -r tornevall-networks-social-media-tools.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude ".idea/*" \
            --exclude "*.DS_Store"

      - name: Update updates.xml
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="${{ steps.version.outputs.TAG }}"
          CODEBASE="https://github.com/Tornevall/tornevall-networks-social-media-tools/releases/download/${TAG}/tornevall-networks-social-media-tools.zip"
          sed -i \
            -e "s|codebase='[^']*'|codebase='${CODEBASE}'|" \
            -e "s|version='[^']*'|version='${VERSION}'|" \
            updates.xml

      - name: Commit updated updates.xml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.xml
          git diff --cached --quiet || git commit -m "chore: bump updates.xml to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "${{ steps.version.outputs.TAG }}"
          generate_release_notes: true
          files: tornevall-networks-social-media-tools.zip
