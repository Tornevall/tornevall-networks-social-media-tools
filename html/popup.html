<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Tornevall Networks Social Media Tools</title>
    <link rel="stylesheet" href="../css/styles.css"/>
    <style>
        body {
            font-family: system-ui, sans-serif;
            padding: 16px;
            width: 320px
        }

        h1 {
            font-size: 18px;
            margin-bottom: 12px
        }

        label {
            display: block;
            font-weight: bold;
            margin-top: 12px
        }

        input, textarea {
            width: 100%;
            margin-top: 4px;
            margin-bottom: 12px;
            padding: 6px;
            box-sizing: border-box;
            font-family: monospace
        }

        button {
            background: #222;
            color: #fff;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            margin-right: 8px
        }

        button:hover {
            background: #444
        }

        #status {
            font-size: 12px;
            margin-top: 10px;
            color: green;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .checkbox-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            margin-top: -8px;
            margin-bottom: 12px;
        }

        .endpoint-note {
            font-size: 12px;
            line-height: 1.45;
            opacity: 0.88;
            margin: 0 0 10px 0;
        }

        .helper-note {
            font-size: 12px;
            line-height: 1.45;
            background: #f5f5f5;
            border: 1px solid #ddd;
            padding: 8px;
            margin: 0 0 12px 0;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }

        .button-row button {
            margin-right: 0;
        }
    </style>
</head>
<body>
<h1>Tornevall Networks Social Media Tools</h1>
<p class="endpoint-note" id="endpointNote">
    Requests are sent through <code>https://tools.tornevall.net/api/ai/socialgpt/respond</code> using your Tools bearer token.
</p>
<p class="helper-note">
    Register at <strong>tools.tornevall.net</strong> and generate a <strong>personal bearer token</strong> there to use this extension.
</p>

<div class="checkbox-inline">
    <input type="checkbox" id="devMode">
    <label for="devMode">Use dev / beta server (<code>tools.tornevall.com</code>)</label>
</div>

<label for="apiKey">Tools API Bearer Token:</label>
<input type="text" id="apiKey" placeholder="Paste your personal Tools token here" />

<label for="responderName">Responder name:</label>
<input type="text" id="responderName" placeholder="Who are you?" />

<div class="checkbox-inline">
    <input type="checkbox" id="autoDetectName">
    <label for="autoDetectName">Auto detect Facebook name</label>
</div>

<label for="systemPrompt">Behavior and personality (stored in Tools):</label>
<textarea id="systemPrompt" rows="5">You are a friendly over intelligent human being, always ready to help. Respond as you are the one involved in the discussion and try to use the language used in the prompt.</textarea>

<div class="button-row">
    <button id="saveKeyBtn">Save Settings</button>
    <button id="testConnectionBtn" type="button">Test</button>
    <button id="resetPromptBtn" type="button">Reset Prompt</button>
</div>

<p id="status"></p>
<script src="../js/popup.js"></script>
</body>
</html>
